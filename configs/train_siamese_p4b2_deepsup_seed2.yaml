# VascuTrace Phase 4 B2 deep-sup SEED-2 confirmatory (seed 20260716->20260722, val_seed fixed). Tests if the +0.018 IoU / +0.023 clean joint gain reproduces.
# segmentation heads at decoder scales x2/x4, reusing the shipped combo_loss
# unmodified at every scale (see train.py module docstring, item 21, and
# model.py module docstring, item 8a). ONE mechanism changed vs v6exp: every
# other field below (cache, loss=combo, aug block, HNM block, batch 128, ema,
# seeds) is HELD identical to v6exp. constrained_iou_selection=true and
# early_stop_patience=150 additionally match the p4b1_fair "fair budget"
# precedent so this candidate is judged on its own best legal-IoU epoch, not
# an early-stop confound.
#
# The frozen B2 specification includes two corrections this file follows (not the original
# original 3-head/nearest-downsample draft): TWO aux heads at scales {2, 4}
# (the spec's x8 head is dropped -- marginal target support even under
# max-pool), and hard-mask downsampling by MAX-POOL (any positive pixel in
# the block -> 1), not nearest/strided sampling -- nearest-style
# downsampling vanishes 24% of this dataset's lesions at x4 and 79% at x8
# (median lesion ~18px), while max-pool preserves all 78 val positives at
# every scale.
#
# Research prototype. Trained and evaluated using simulated vascular-like abnormalities, not confirmed human post-angioplasty lesions.
#
# EXPLORATORY -- NOT CERTIFIABLE. Parsed settings equal v6exp plus the
# deep-supervision block below (and the constrained-selector/fair-budget
# pair v6exp itself did not set). Hard samples receive weight 3 while
# positives and easy negatives retain weight 1, so the HNM sampler increases
# total negative class mass; it is not class-mass preserving. Report clean
# and activation rates separately.

train_cache_dir: data/processed/p6_cache_big/train
val_cache_dir: data/processed/p6_cache_big/val

seed: 20260722
val_seed: 20260716

device: cuda
amp: true

loss: combo
selection_metric: dice_x_clean
lr_schedule: cosine
warmup_steps: 60

batch_size: 128
max_epochs: 150
lr: 0.0005
weight_decay: 0.0001
early_stop_patience: 150
grad_clip_norm: 1.0
num_workers: 6
log_every_n_steps: 20

# --- Carried over unchanged from v6exp (anti-saturation / anti-overfit) ---
augment: true
augment_rotation_deg: 10.0
augment_translate_px: 6.0
augment_scale_delta: 0.10
augment_pet_gain_delta: 0.10
augment_pet_bias: 0.05
augment_ct_gain_delta: 0.10
augment_ct_bias: 0.05

ema_decay: 0.999

secondary_selection_metric: mean_positive_iou

# --- Carried over unchanged from v6exp: online hard-negative mining ---
# (train.py module docstring, item 16). Requires train_cache_dir (set
# above) -- the mechanism needs CachedSampleDataset's stable index
# addressing and known positive/negative split point.
hard_negative_mining: true
# Top fraction of OBSERVED negative training samples (ranked by the historical
# score-space false-activation surrogate, capped at -log(1e-6) per pixel,
# then accumulated as a per-sample EMA) treated as "hard" each epoch.
hard_negative_fraction: 0.35
# Sampling-weight multiplier applied to hard negatives (vs. weight 1.0 for
# every easy negative AND every positive) when building each mining epoch's
# WeightedRandomSampler.
hard_negative_oversample_weight: 3.0
# Epoch 0 is ALWAYS uniform (no scores exist yet); this many total epochs
# stay uniform before mining activates (floor is max(1, this value)).
hard_negative_warmup_epochs: 1
# EMA momentum for the per-index false-activation score (Polyak-averaging,
# same idea as ema_decay above, applied to a scalar per training index).
hard_negative_score_momentum: 0.5

model_config: {}
dataset_config: {}

# --- Track A2: constrained-floor IoU checkpoint selector (path-to-0.70 plan) ---
# Saves best_constrained_iou.pt = max mean_positive_iou among epochs passing the
# legality floors, so this run captures its best LEGAL IoU epoch (closes the
# Phase-4 dice_x_clean early-stop confound). Report-only floors; primary early-stop unchanged.
constrained_iou_selection: true
constrained_iou_min_precision: 0.901
constrained_iou_min_f1: 0.859
constrained_iou_min_clean: 0.0

# --- This run's own subject: Phase 4 B2 (=L4) deep supervision ---
# (train.py module docstring, item 21). The ONLY mechanism this config
# changes vs v6exp. Two train-only aux heads on the up2 (x2 downsample,
# 32ch)/up3 (x4 downsample, 64ch) decoder outputs, each supervised by the
# SAME combo_loss (same tversky/bce weights as the main term -- this file
# does not set tversky_fn_weight/tversky_fp_weight, so both stay at
# losses.py's own 0.7/0.3 defaults, identically to v6exp) against a
# max-pool-downsampled hard target_mask / min-pool-downsampled valid_mask.
# deep_supervision_weights are deep-to-shallow decay (finest scale gets the
# larger weight); model_config.deep_supervision is derived automatically
# from this flag (TrainConfig.__post_init__) -- no model_config edit needed.
deep_supervision: true
deep_supervision_scales: [2, 4]
deep_supervision_weights: [0.5, 0.25]
